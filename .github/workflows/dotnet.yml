# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

 steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      # Add the path to the solution here
      run: dotnet restore ./TestingExercise/TestingExercise/TestingExercise.sln

    - name: Build
      # And here
      run: dotnet build ./TestingExercise/TestingExercise/TestingExercise.sln --no-restore

    - name: Test
      # And here (or target a specific .csproj for tests)
      run: dotnet test ./TestingExercise/TestingExercise/TestingExercise.sln --no-build --verbosity normal
